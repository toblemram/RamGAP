name: Deploy til Azure

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies and run tests
        env:
          PYTHONPATH: backend
        run: |
          pip install -r requirements.txt
          python -m pytest tests/unit/ -v

      - name: Deploy backend til Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-ramgap-backend
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: .

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create antenv virtualenv for Azure
        run: |
          cd frontend
          python -m venv antenv
          source antenv/bin/activate
          pip install streamlit>=1.36.0 streamlit-plotly-events>=0.0.6 requests>=2.31.0 plotly>=5.18.0

      - name: Deploy frontend til Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-ramgap-frontend-fshfhrgjaaefe0c0
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend
